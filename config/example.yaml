host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 30s

models:
  your-model-name:
    command: |
      llama-server
      -hf org/repo:quant
      --no-mmproj -ngl 99 -fa on -np 1 -t 8 -tb 8 -c 32000
      -b 512 -ub 512 --no-warmup
      --cache-type-k q5_0 --cache-type-v q5_0 -cb
      --temp 0.7 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 0.0 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1235 --alias your-model-name
    host: 127.0.0.1:1235
    ready_timeout: 2h

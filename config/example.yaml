models:
  # ── Qwen & Qwopus (35B - 96k Context - Q8 Cache - Gem12 Optimized) ──────────
  qwen-3.6-35b-architect:
    command: |
      llama-server
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M
      -ngl 99 -fa on -np 1 -t 8 -tb 16 -c 96000
      -b 512 -ub 512 --no-context-shift --mlock
      --cache-type-k q8_0 --cache-type-v q8_0
      --jinja --temp 0.8 --top-p 0.95 --top-k 20 --min-p 0.0
      --host 127.0.0.1 --port 1235 --alias qwen-3.6-35b-architect
    host: 127.0.0.1:1235
    ready_timeout: 2h


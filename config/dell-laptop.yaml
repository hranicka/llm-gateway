  # Machine: Dell laptop — Intel Core Ultra 7 265H (6 P-cores + 8 E-cores) + 32GB RAM.
  # eGPU:   16GB NVIDIA RTX 5060 Ti over Thunderbolt 5.
  # Models: 35B/27B/26B heavy MoE with MTP speculative decoding, partially
  #         offloaded (-ngl 22..30); 12B fully offloaded (-ngl 99).
  #         131072-token context (98304 for the 27B coder), q8_0 KV cache.
  #         -t 6 targets the 6 P-cores; --split-mode none keeps all layers on
  #         the eGPU (see note in section 1).


      -hf Jackrong/Qwopus3.6-35B-A3B-v1-MTP-GGUF:Q4_K_M
      --jinja --no-mmproj --no-context-shift --split-mode none
      -ngl 22 -fa on -np 1 -t 6 -tb 6 -c 131072
      --rope-scaling yarn --rope-scale 4 --yarn-orig-ctx 32768
      -b 1024 -ub 1024 --no-warmup --no-mmap
      --cache-type-k q8_0 --cache-type-v q8_0 -cb
      --spec-type draft-mtp --spec-draft-n-max 2
      --chat-template-kwargs '{"enable_thinking":true}'
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 0.0 --repeat-penalty 1.0
      --reasoning on
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-35b-mtp-gpu-planner
    host: 127.0.0.1:1235
    ready_timeout: 2h


host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 30s

models:
  # ══════════════════════════════════════════════════════════════════════════
  # ── MODELS FOR INTERNAL NVIDIA PRO 500 6GB GPU ────────────────────────────
  # ══════════════════════════════════════════════════════════════════════════
  # Machine: Dell laptop — Intel Core Ultra 7 265H (6 P-cores + 8 E-cores).
  # GPU:    Internal NVIDIA Pro 500 (6GB GDDR6). Fast 4B / 2B MoE quants fit
  #         with 32k/16k context; -ngl 99 fully offloads to the 6GB GPU.
  #         -t 6 targets the 6 P-cores.
  # Note: --split-mode none keeps all layers on the internal 6GB GPU.

  qwopus-3.5-4b-planner:
    command: |
      llama-server
      -hf Jackrong/Qwopus3.5-4B-v3-GGUF:Q4_K_M
      --jinja --no-mmproj --split-mode none
      -ngl 99 -fa on -np 1 -t 6 -tb 6 -c 32000
      -b 512 -ub 512 --no-warmup
      --cache-type-k q5_0 --cache-type-v q5_0 -cb
      --chat-template-kwargs '{"enable_thinking":true}'
      --reasoning on
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 0.0 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1235 --alias qwopus-3.5-4b-planner
    host: 127.0.0.1:1235
    ready_timeout: 2h

  qwen-3.5-4b-architect:

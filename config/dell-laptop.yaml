host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 5m

models:
  # Machine: Dell laptop — Intel Core Ultra 7 265H (6P+8E). GPU: NVIDIA Pro 500 (6GB GDDR6).
  # Built with CUDA 13 + CMAKE_CUDA_ARCHITECTURES=89 (sm_120 SOFT_MAX kernel bugged).
  # JetBrains sends ~11.5K token payloads — ctx-size must exceed that.

  qwen-3.5-4b:
    command: |
      llama-server
      -hf unsloth/Qwen3.5-4B-GGUF:Q4_K_M
      --n-gpu-layers -1 --parallel 1 --threads 6
      --ctx-size 16384
      --flash-attn on --no-mmap --no-mmproj --jinja
      --batch-size 512 --ubatch-size 128
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1236 --alias qwen-3.5-4b
    host: 127.0.0.1:1236
    ready_timeout: 2h

  gemma-4-2b:
    command: |
      llama-server
      -hf unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL
      --n-gpu-layers -1 --parallel 1 --threads 6
      --ctx-size 16384
      --flash-attn on --no-mmap --no-mmproj --jinja
      --batch-size 512 --ubatch-size 128
      --temp 0.6 --top-p 0.95 --top-k 64 --presence-penalty 0.0 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1237 --alias gemma-4-2b
    host: 127.0.0.1:1237
    ready_timeout: 2h

host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 30s

models:
  # ══════════════════════════════════════════════════════════════════════════
  # ── STANDALONE MODES (Radeon 780M iGPU + 32GB RAM, fully offloaded)
  # ══════════════════════════════════════════════════════════════════════════
  # Machine: gem12 — AMD Ryzen 7 8845HS (8c/16t) + 32GB RAM.
  # GPU:    Integrated Radeon 780M (RDNA3, UMA — shares system RAM).
  # Models: 35B-A3B / 26B-A4B MoE quants — fully offloaded to iGPU.

  qwopus-3.6-35b:
    command: |
      llama-server
      -hf Jackrong/Qwopus3.6-35B-A3B-v1-GGUF:Q4_K_M
      -ngl 99 --parallel 1 --threads 8 --threads-batch 8
      --ctx-size 96000 --cont-batching
      --rope-scaling yarn --rope-scale 3 --yarn-orig-ctx 32768
      --cache-type-k q8_0 --cache-type-v q8_0
      --flash-attn on --no-mmap --no-mmproj --jinja --tools all
      --batch-size 4096 --ubatch-size 4096
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-35b
    host: 127.0.0.1:1235
    ready_timeout: 2h

  qwen-3.6-35b-architect:

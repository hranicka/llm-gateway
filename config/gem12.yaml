      --n-gpu-layers 999 --parallel 1 --threads 8 --threads-batch 8
      --ctx-size 98304 --cont-batching
      --rope-scaling yarn --rope-scale 3 --yarn-orig-ctx 32768
      --cache-type-k q8_0 --cache-type-v q8_0
      --flash-attn on --no-mmap --no-mmproj --jinja --tools all
      --batch-size 4096 --ubatch-size 4096
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-35b

host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 30s

models:
  # ══════════════════════════════════════════════════════════════════════════
  # ── 1. STANDALONE MODES (no dGPU — Radeon 780M iGPU + 32GB RAM) ───────────
  # ══════════════════════════════════════════════════════════════════════════
  # Machine: gem12 — AMD Ryzen 7 8845HS (8c/16t) + 32GB RAM, no dedicated GPU.
  # GPU:    Integrated Radeon 780M (RDNA3, UMA — shares system RAM).
  # Models: 35B-A3B / 26B-A4B MoE quants — the largest that fit 32GB RAM.
  #         -ngl 99 offloads all layers to the iGPU (Vulkan/ROCm);
  #         -t 8 matches the 8 physical cores.

  qwopus-3.6-35b-planner:
    command: |
      llama-server
      -hf Jackrong/Qwopus3.6-35B-A3B-v1-GGUF:Q4_K_M
      --jinja --no-mmproj --no-context-shift
      -ngl 99 -fa on -np 1 -t 8 -tb 8 -c 98304
      --rope-scaling yarn --rope-scale 3 --yarn-orig-ctx 32768
      -b 1024 -ub 1024 --no-warmup --no-mmap
      --cache-type-k q8_0 --cache-type-v q8_0 -cb
      --chat-template-kwargs '{"enable_thinking":true}'
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --reasoning on
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-35b-planner
    host: 127.0.0.1:1235
    ready_timeout: 2h

  qwen-3.6-35b-architect:

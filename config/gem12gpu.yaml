host: 0.0.0.0:1234
debug: true
auto_unload: 2h
drain_timeout: 30s

models:
  # ══════════════════════════════════════════════════════════════════════════
  # ── eGPU ACCELERATED MODES (16GB NVIDIA RTX 5060 Ti via OCuLink)
  # ══════════════════════════════════════════════════════════════════════════
  # Machine: gem12 — AMD Ryzen 7 8845HS (8c/16t) + 32GB RAM.
  # eGPU:   16GB NVIDIA RTX 5060 Ti over OCuLink (PCIe direct, high bandwidth).
  # Strategy:
  #   * n-cpu-moe 22 at 128K ctx with 4096/4096 batch — proven working combo.
  #   * --cont-batching, --no-mmproj help VRAM.

  qwopus-3.6-35b-gpu-planner:
    command: |
      llama-server
      -hf Jackrong/Qwopus3.6-35B-A3B-v1-GGUF:Q4_K_M
      --n-gpu-layers 999 --n-cpu-moe 17 --parallel 1 --threads 8 --threads-batch 8
      --ctx-size 131072
      --cont-batching
      --rope-scaling yarn --rope-scale 4 --yarn-orig-ctx 32768
      --cache-type-k q8_0 --cache-type-v q8_0
      --flash-attn on --no-mmap --no-mmproj --jinja --tools all
      --batch-size 4096 --ubatch-size 4096
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-35b-gpu-planner
    host: 127.0.0.1:1235
    ready_timeout: 2h

  qwen-3.6-35b-gpu-architect:

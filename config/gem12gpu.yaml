  # ══════════════════════════════════════════════════════════════════════════
  # ── DENSE 27B MTP VARIANTS (the only MTP family that helps on this hardware)
  # ══════════════════════════════════════════════════════════════════════════
  # Qwopus 27B is dense, so the MTP draft head is much cheaper than the main
  # FFN and speculative decode gives a real speedup. MoE MTP was tested and
  # rejected: high acceptance but draft generation was not faster.
  #
  # Planner / Architect / Instruct share the general Qwopus 27B v2 weights.
  # Coder uses the reasoning-distilled Coder weights. v2 is slightly larger
  # (16.8 vs 16.2 GiB Q4_K_M), so -ngl is conservative (24 vs 26).

  qwopus-3.6-27b-mtp-gpu-planner:
    command: |
      llama-server
      -hf Jackrong/Qwopus3.6-27B-v2-MTP-GGUF:Q4_K_M
      --jinja --no-mmproj --no-context-shift --split-mode none
      -ngl 24 -fa on -np 1 -t 8 -tb 8 -c 98304 --ctx-checkpoints 4
      --rope-scaling yarn --rope-scale 3 --yarn-orig-ctx 32768
      -b 4096 -ub 4096 --no-warmup --no-mmap
      --cache-type-k q8_0 --cache-type-v q8_0 -cb
      --spec-type draft-mtp --spec-draft-n-max 2
      --chat-template-kwargs '{"enable_thinking":true}'
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 1.5 --repeat-penalty 1.0
      --reasoning on
      --host 127.0.0.1 --port 1235 --alias qwopus-3.6-27b-mtp-gpu-planner
    host: 127.0.0.1:1235
    ready_timeout: 2h


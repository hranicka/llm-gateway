name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: GOOS=linux GOARCH=amd64 go build -o llm-gateway ./cmd/gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: llm-gateway
          path: llm-gateway
          retention-days: 7
